COM_ALFA_TOOLS_INTEGRITY_ADDED="Injected files inside the core (not part of the official release). Core files should never be added or edited directly — customisation goes through plugins and template/layout overrides — so anything here is unexpected and may be malicious. Investigate immediately:"
COM_ALFA_TOOLS_INTEGRITY_BUMPED_OK="The manifest version has been bumped since the baseline was captured."
COM_ALFA_TOOLS_INTEGRITY_CAVEAT="Compares your installed files against the official signed checksums on our server — reliably catching the common, automated, file-only tampering. The checksums are signed with our key (never present on your site), so they <strong>cannot be forged here</strong>; but the check runs on your server, so a fully-compromised site could disable it or block our checksums. A clean result is strong tamper-evidence, not an absolute guarantee."
COM_ALFA_TOOLS_OFFICIAL_TITLE="Official release verification"
COM_ALFA_TOOLS_OFFICIAL_OK="Verified against the official release %1$s — this install matches the Alfa Commerce distribution signed by Easylogic, byte for byte."
COM_ALFA_TOOLS_OFFICIAL_MODIFIED="This install does NOT match the official release %1$s. Core files should never be edited (customise via plugins and template/layout overrides) — review every item below; injected files are the highest priority."
COM_ALFA_TOOLS_OFFICIAL_AHEAD="This install is ahead of / customised from the latest official release (%1$s). The differences below are expected if you are developing or running a newer build — informational, not a tamper alarm."
COM_ALFA_TOOLS_OFFICIAL_UNREACHABLE="Could not reach the official checksums on the CDN (offline, or not yet published for this version). Official verification was skipped — a connectivity state, not a problem with your files."
COM_ALFA_TOOLS_OFFICIAL_BAD_SIG="The official checksums failed signature verification and must NOT be trusted — possibly a tampered or forged reference, or a network interception. Do not rely on this result; check your connection and the CDN."

