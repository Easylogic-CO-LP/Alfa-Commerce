COM_ALFA_ORDEREMAIL_POSITIONS_NOTE_BODY = "<p>The selected <strong>email layout</strong> is the HTML wrapper for the message. It defines <strong>positions</strong> — editable content slots, each shown below as one editor per language. Choosing a different layout changes which positions are available; the editors below refresh automatically.</p><p><strong>Tokens</strong> such as <code>{order_number}</code> or <code>{status_customer}</code> can be inserted into any subject or position — select a token chip to add it. They are also valid inside the layout file itself. Every token is replaced with the order's real data at the moment the email is sent.</p><p><strong>Customising the design.</strong> The layouts ship with the component, so edit them through a template override rather than the originals (overrides survive component updates). In the back end go to <em>System → Templates → Administrator templates</em>, open your active admin template — currently <strong>%1$s</strong> — open its <em>Create Overrides</em> tab, then choose <em>Layouts → com_alfa → emails</em>; Joomla copies that layout folder into the template for you to edit (the order email lives in <code>emails/order/default.php</code>). To do it by hand instead, create the folder <code>administrator/templates/%1$s/html/layouts/com_alfa/emails/order/</code> and copy the layout file there. Joomla then loads your copy in place of the default, and any new layout file you add in that folder also appears in the layout list above.</p><p><strong>Your own layout &amp; positions.</strong> Drop a new PHP file into that same <code>emails/order/</code> folder — say <code>premium.php</code> — and it appears in the layout list automatically as <em>Premium</em>. Inside it, call <code>$position('banner')</code> / <code>$hasPosition('banner')</code> for each editable slot you want; every position you declare becomes its own per-language editor here. To give a custom layout and its positions readable names and default content, add these com_alfa language constants — update-safe via <em>System → Manage → Language Overrides</em> (Location: <em>Administrator</em>): <code>COM_ALFA_ORDEREMAIL_LAYOUT_PREMIUM</code> for the picker label, and for a position named <code>banner</code>: <code>COM_ALFA_ORDEREMAIL_POSITION_BANNER</code> (editor label), <code>COM_ALFA_ORDEREMAIL_PH_BANNER</code> (empty-slot placeholder) and <code>COM_ALFA_ORDEREMAIL_DEFAULT_BANNER</code> (the HTML the <em>Restore defaults</em> button writes). The constant name is always the layout or position name in CAPITALS. All are optional — without them the layout still works, positions show a title-cased name, and <em>Restore defaults</em> simply skips any position with no default constant.</p><p>If you switch layouts and the previous one had positions the new one does not, any content already written is preserved under a <em>Carried over</em> section so it can be moved into a current position. Clear it and save to remove it.</p>"
