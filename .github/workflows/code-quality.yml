name: Code Quality

on:
  pull_request:
    branches: [main, developer]
  push:
    branches: [main, developer]

jobs:
  php-cs-fixer:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: php-cs-fixer

      - name: Run PHP CS Fixer
        run: php-cs-fixer fix --config=.php-cs-fixer.php --allow-risky=yes --diff

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "style: auto-fix code style with PHP CS Fixer"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpstan

      - name: Fetch latest Joomla (PHPStan symbol resolution)
        run: |
          url=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/joomla/joomla-cms/releases/latest | jq -r '.assets[] | select(.name | endswith("Full_Package.zip")) | .browser_download_url' | head -1)
          echo "Latest Joomla package: $url"
          curl -sL -o /tmp/joomla.zip "$url"
          mkdir -p joomla && unzip -q /tmp/joomla.zip -d joomla

      - name: Run PHPStan
        run: phpstan analyse --configuration=phpstan.neon --memory-limit=1G --error-format=github
        continue-on-error: true
