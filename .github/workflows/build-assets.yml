name: Build & Minify Assets

on:
  push:
    branches: [main, developer]
    paths:
      - 'media/css/**'
      - 'media/js/**'
  pull_request:
    branches: [main, developer]
    paths:
      - 'media/css/**'
      - 'media/js/**'

jobs:
  minify-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install minification tools
        run: |
          npm install -g csso-cli terser

      - name: Minify CSS and create gzip variants
        run: |
          find media/css/site media/css/admin -name '*.css' ! -name '*.min.css' | while read file; do
            if [ -f "$file" ]; then
              minfile="${file%.css}.min.css"
              # Minified version (Joomla loads this in production)
              csso "$file" --output "$minfile"
              # Gzip of minified (htaccess serves this in production)
              gzip -9 -k -f "$minfile"
              # Gzip of original (htaccess serves this in debug mode)
              gzip -9 -k -f "$file"
              echo "Built: $minfile, $minfile.gz, $file.gz"
            fi
          done

      - name: Minify JS and create gzip variants
        run: |
          find media/js/site media/js/admin -name '*.js' ! -name '*.min.js' | while read file; do
            if [ -f "$file" ]; then
              minfile="${file%.js}.min.js"
              # Minified version (Joomla loads this in production)
              terser "$file" --compress --mangle --output "$minfile"
              # Gzip of minified (htaccess serves this in production)
              gzip -9 -k -f "$minfile"
              # Gzip of original (htaccess serves this in debug mode)
              gzip -9 -k -f "$file"
              echo "Built: $minfile, $minfile.gz, $file.gz"
            fi
          done

      - name: Commit built assets
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A media/css/**/*.min.css media/css/**/*.gz media/js/**/*.min.js media/js/**/*.gz
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: Minify and gzip CSS/JS assets [skip ci]"
            git push
          fi
