name: Build & Minify Assets

on:
  push:
    branches: [main, developer]
    paths:
      - 'media/css/**'
      - 'media/js/**'
  pull_request:
    branches: [main, developer]
    paths:
      - 'media/css/**'
      - 'media/js/**'

jobs:
  minify-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install minification tools
        run: |
          npm install -g csso-cli terser

      - name: Minify and gzip CSS
        run: |
          find media/css/site media/css/admin -name '*.css' ! -name '*.min.css' | while read file; do
            if [ -f "$file" ]; then
              # Minify then gzip directly to file.css.gz
              csso "$file" | gzip -9 > "$file.gz"
              echo "Built: $file.gz"
            fi
          done

      - name: Minify and gzip JS
        run: |
          find media/js/site media/js/admin -name '*.js' ! -name '*.min.js' | while read file; do
            if [ -f "$file" ]; then
              # Minify then gzip directly to file.js.gz
              terser "$file" --compress --mangle | gzip -9 > "$file.gz"
              echo "Built: $file.gz"
            fi
          done

      - name: Commit gzipped assets
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A media/css/**/*.gz media/js/**/*.gz
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: Minify and gzip CSS/JS assets [skip ci]"
            git push
          fi
