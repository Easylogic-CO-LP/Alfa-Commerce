PLG_SYSTEM_ALFASYNC_XML_DESCRIPTION="Keeps Alfa Commerce tables (#__alfa_users, #__alfa_usergroups) in sync with Joomla core user and usergroup data. All sync logic lives in SyncHelper — shared with the installer and frontend registration. Bundled with com_alfa."

PLG_SYSTEM_ALFASYNC_FIELDSET_BASIC="Sync Settings"

PLG_SYSTEM_ALFASYNC_SYNC_USERS_LABEL="Sync Users"
PLG_SYSTEM_ALFASYNC_SYNC_USERS_DESC="Insert a row into #__alfa_users when a new Joomla user is created."

PLG_SYSTEM_ALFASYNC_SYNC_USERGROUPS_LABEL="Sync Usergroups"
PLG_SYSTEM_ALFASYNC_SYNC_USERGROUPS_DESC="Insert a row into #__alfa_usergroups when a new Joomla usergroup is created. Default price settings are read from Alfa Commerce component configuration."

PLG_SYSTEM_ALFASYNC_DELETE_USERS_LABEL="Delete Users on Remove"
PLG_SYSTEM_ALFASYNC_DELETE_USERS_DESC="Remove the #__alfa_users row when a Joomla user is deleted. Disable to retain Alfa data after user removal."

PLG_SYSTEM_ALFASYNC_DEBUG_LOG_LABEL="Debug Logging"
PLG_SYSTEM_ALFASYNC_DEBUG_LOG_DESC="Write sync activity to administrator/logs/alfa_sync.php. Disable on production."
